<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | CISO Roundtable 2026</title>
    <link rel="icon" type="image/svg+xml" href="SSquad_logoIcon.svg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ssg: {
                red: '#EC2024',
                dark: '#0B0F19',
                cyber: '#5B2EFF',
              },
            },
            fontFamily: {
              heading: ['Plus Jakarta Sans', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>
    
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply text-slate-800 bg-ssg-dark font-body antialiased;
        }
        h1, h2, h3 {
          @apply font-heading tracking-tight;
        }
      }

      /* Hero Background & Animations styles reused from index.html */
      .hero {
        position: relative;
        isolation: isolate;
        overflow: hidden;
      }
      .hero::before {
        content: '';
        position: absolute;
        width: 28rem;
        height: 28rem;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background: radial-gradient(circle, rgba(208, 46, 50, 0.2) 0%, rgba(63, 18, 108, 0.1) 60%, transparent 80%);
        filter: blur(60px);
        pointer-events: none;
        z-index: 0;
      }
      .hero-grid-overlay {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        pointer-events: none;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center relative hero">
    <div class="hero-grid-overlay"></div>
    
    <div class="relative z-10 w-full max-w-2xl mx-auto px-6 text-center animate-fade-in-up">
      <!-- Logo -->
      <div class="flex justify-center items-center gap-6 mb-10">
        <a href="index.html">
          <img src="SSquad_logo_white.svg" alt="Ssquad Global" class="h-10 w-auto" />
        </a>
        <span class="text-white/40 text-2xl font-light leading-none">|</span>
        <a href="#">
          <img src="securonix_logo_reverse.png" alt="Securonix" class="h-7 w-auto opacity-90 relative -top-[1px]" />
        </a>
      </div>
      
      <!-- Thank You Card -->
      <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-10 md:p-14 shadow-2xl shadow-black/50">
        <div class="h-20 w-20 bg-ssg-red/20 rounded-full flex items-center justify-center mx-auto mb-8 border border-ssg-red/30">
          <i class="ph ph-check-circle text-4xl text-ssg-red"></i>
        </div>
        
        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Registration Received</h1>
        <p class="text-lg text-slate-300 mb-8 leading-relaxed font-light">
          Thank you for RSVPing to the CISO Roundtable 2026. A confirmation email with the event details has been sent to your inbox.
        </p>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
          <a href="index.html" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 rounded-xl bg-ssg-red px-6 py-3.5 text-sm font-bold text-white transition-all duration-300 hover:bg-white hover:text-ssg-red shadow-[0_0_15px_rgba(236,32,36,0.3)]">
            <i class="ph ph-arrow-left"></i> Return to Homepage
          </a>
          <a href="https://ssquad.com" target="_blank" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 rounded-xl border border-white/20 bg-white/5 px-6 py-3.5 text-sm font-bold text-white transition-all duration-300 hover:bg-white/10 hover:border-white/40">
            Visit Ssquad Global <i class="ph ph-arrow-up-right"></i>
          </a>
        </div>
      </div>
      
      <!-- Footer Note -->
      <div class="mt-12 text-slate-500 text-sm">
        <p>© 2026 Ssquad Global. By Invitation Only.</p>
      </div>
    </div>
  </body>
</html>
